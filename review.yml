      of Courses (SOC) JSON API returns real course data (HTTP 200 with a term
      parameter); the SOC filters endpoint resolves (200); the official
      UniversityofFlorida GitHub org exists with 3 public repos; ufl.edu, it.ufl.edu,
      ufdc.ufl.edu and info.apps.ufl.edu all return 200. Campus map JSON host
      responds but blocks automated clients (403). UFDC OAI-PMH/RSS feeds are
      documented by UF Library Technology Services; the legacy SobekCM OAI path
      now redirects to a React app and an OpenAPI API is noted as forthcoming.
      No endpoints fabricated; gated identity/SIS APIs excluded.
